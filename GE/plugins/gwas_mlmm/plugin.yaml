id: gwas_mlmm
name: "GWAS (MLMM)"
description: Multi-Locus Mixed Model (MLMM) GWAS (best-effort scaffold). Uses PLINK/VCF/TSV genotype inputs similar to gaston.
version: 0.1.0
runner:
  language: r
  entry: runner.R
inputs:
  - phenotype_tsv
  - trait
  - plink_prefix
outputs:
  - results.tsv
  - plots/manhattan.png
  - plots/manhattan.html
  - plots/qq.png
  - plots/qq.html
