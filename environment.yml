  - bioconductor-bayseq=2.40.0
  - bioconductor-annotationdbi=1.68.0
  - bioconductor-annotationforge=1.48.0
  - bioconductor-go.db=3.20.0
  - bioconductor-gostats=2.72.0
  - bioconductor-topgo=2.58.0
  - bioconductor-clusterprofiler=4.14.0
  - bioconductor-enrichplot=1.26.1
  - bioconductor-goseq=1.58.0
  - bioconductor-coseq=1.30.0
  - bioconductor-deseq2=1.46.0
  - bioconductor-edger=4.4.0
  - bioconductor-limma=3.62.1
  - bioconductor-tcc=1.46.0
  - bioconductor-ebseq=2.4.0
  - bioconductor-noiseq=2.50.0
